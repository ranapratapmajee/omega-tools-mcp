# filepath: ./docker-compose.yaml
services:
  omega-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: omega-mcp:latest
    container_name: nexus-tools-mcp
    ports:
      - "8080:8000"
    environment:
      - ENV=production
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      
      # Clean standard configurations
      - MAX_RESULTS=3
      - NEO4J_URI=bolt://your-neo4j-host:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=your_secure_password
      - CHROMA_HOST=your-chroma-host
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=knowledge_pool
      - LOCAL_LLM_URL=http://your-llm-orchestrator:11434
      - EMBEDDING_MODEL=nomic-embed-text
    restart: unless-stopped